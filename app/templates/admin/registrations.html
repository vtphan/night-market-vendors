{% extends "base.html" %}

{% block title %}Registrations - Admin - Asian Night Market{% endblock %}

{% block content %}
<h2>Registrations</h2>

<form method="get" action="/admin/registrations" class="filter-bar">
    <div class="grid">
        <select name="status">
            <option value="">All Statuses</option>
            {% for s in ['pending', 'approved', 'rejected', 'confirmed', 'cancelled'] %}
            <option value="{{ s }}" {{ 'selected' if filter_status == s }}>{{ s | title }}</option>
            {% endfor %}
        </select>

        <select name="category">
            <option value="">All Categories</option>
            {% for key, label in CATEGORIES.items() %}
            <option value="{{ key }}" {{ 'selected' if filter_category == key }}>{{ label }}</option>
            {% endfor %}
        </select>

        <select name="insurance">
            <option value="">Insurance: All</option>
            <option value="yes" {{ 'selected' if filter_insurance == 'yes' }}>Insurance: Yes</option>
            <option value="no" {{ 'selected' if filter_insurance == 'no' }}>Insurance: No</option>
        </select>

        <input type="search" name="search" placeholder="Search name, email, or ID..."
               value="{{ filter_search }}">

        <button type="submit">Filter</button>
    </div>
</form>

<p>{{ registrations | length }} registration{{ 's' if registrations | length != 1 }} found.
   <a href="/admin/export">Export CSV</a>
</p>

<figure>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Business</th>
                <th>Contact</th>
                <th>Category</th>
                <th>Booth</th>
                <th>Status</th>
                <th>Insurance</th>
                <th>Date</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for reg in registrations %}
            <tr>
                <td><code>{{ reg.registration_id }}</code></td>
                <td>{{ reg.business_name }}</td>
                <td>{{ reg.contact_name }}</td>
                <td>{{ CATEGORIES.get(reg.category, reg.category) }}</td>
                <td>{{ booth_types[reg.booth_type_id].name if reg.booth_type_id in booth_types else 'N/A' }}</td>
                <td><span class="status-badge {{ reg.status }}">{{ reg.status | title }}</span></td>
                <td>{{ 'Yes' if reg.documents_approved else 'No' }}</td>
                <td>{{ reg.created_at.strftime('%b %d') if reg.created_at else '' }}</td>
                <td><a href="/admin/registrations/{{ reg.registration_id }}">View</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</figure>
{% endblock %}
