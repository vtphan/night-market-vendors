{% extends "base.html" %}

{% block title %}Vendor Registration - Step 1 - Asian Night Market{% endblock %}

{% block content %}
<h2>Vendor Registration</h2>
<div class="step-progress">
    <span class="step active">1. Agreement</span>
    <span class="step">2. Profile</span>
    <span class="step">3. Booth</span>
    <span class="step">4. Review</span>
</div>

<article>
    <header><h3>Vendor Participation Agreement</h3></header>
    <div style="max-height: 300px; overflow-y: auto; padding: 1rem; background: var(--pico-card-background-color); border: 1px solid var(--pico-muted-border-color); border-radius: 4px; margin-bottom: 1rem; white-space: pre-line;">{{ agreement_text }}</div>

    <form method="post" action="/vendor/register/step1">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <label for="contact_name">Full Name</label>
        <input type="text" id="contact_name" name="contact_name" required placeholder="Your full name">

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com">

        <fieldset>
            <label>
                <input type="checkbox" name="agreement_accepted" value="yes" required>
                I have read and agree to the Vendor Participation Agreement
            </label>
        </fieldset>

        <button type="submit">Continue to Step 2</button>
    </form>
</article>
{% endblock %}
