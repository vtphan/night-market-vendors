{% extends "base.html" %}

{% block title %}Vendor Registration - Step 3 - Asian Night Market{% endblock %}

{% block content %}
<h2>Vendor Registration</h2>
<div class="step-progress">
    <span class="step completed">1. Agreement</span>
    <span class="step completed">2. Profile</span>
    <span class="step active">3. Booth</span>
    <span class="step">4. Review</span>
</div>

<article>
    <header><h3>Select Your Booth Type</h3></header>
    <form method="post" action="/vendor/register/step3">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        {% for bt in booth_types %}
        <label class="booth-option">
            <input type="radio" name="booth_type_id" value="{{ bt.id }}"
                   {{ 'checked' if draft.get('booth_type_id') == bt.id }} required>
            <div>
                <strong>{{ bt.name }}</strong> — {{ format_price(bt.price) }}
                <br><small>{{ bt.description }}</small>
            </div>
        </label>
        {% endfor %}

        <button type="submit">Continue to Step 4</button>
    </form>
</article>
{% endblock %}
